<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | Project Cards</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background-color: #1C1C2B;
      color: #C2C2C2;
      font-family: Courier;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 { margin-top: 25px; color: #fff; }

    #profile-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 30px;
    }

    .profile-card {
      display: flex;
      align-items: center;
      background-color: #2c2f36;
      padding: 12px 18px;
      border-radius: 8px;
      width: 360px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
      gap: 12px;
    }

    .profile-card:hover { transform: scale(1.005); }

    .rank {
      font-size: 1.3em;
      font-weight: bold;
      color: #fdcb6e;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .profile-pic-square {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #ccc;
      flex-shrink: 0;
    }

    .profile-info { text-align: left; }

    .profile-name {
      color: #00cec9;
      font-weight: bold;
      font-size: 1.1em;
      text-decoration: none;
    }

    .profile-name:hover { text-decoration: underline; }

    .profile-points {
      color: #00b894;
      font-size: 1em;
      margin: 2px 0;
    }

    .profile-breakdown {
      color: #888;
      font-size: 0.8em;
      margin: 0;
    }

    .button {
      background-color: #40557A;
      color: white;
      border: none;
      border-radius: 2px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 1em;
      font-family: Courier;
      transition: background 0.2s;
      text-decoration: none;
    }

    .button:hover { background-color: #476DC9; }
  </style>
</head>
<body>
  <h1>Leaderboard</h1>
  <p>Ranked by net worth (cash + card value). Click a name to view their inventory.</p>
  <div id="profile-list"></div>
  <br>
  <a href="menu.html" class="button" style="text-decoration:none">Menu</a>
  <a href="store.html" class="button" style="text-decoration:none">Shop</a>
  <a href="dashboard.html" class="button" style="text-decoration:none">Dashboard</a>

  <script type="module" src="js/profiles.js"></script>
</body>
</html>
