<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Cards</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <img src="https://firebasestorage.googleapis.com/v0/b/projectcards-b6b53.firebasestorage.app/o/gamesprites%2Ficon.png?alt=media&token=ebc2eae1-0069-4fd7-9eee-8eca3ce85bb4" alt="Project Cards" class="auth-logo" />
    <h1>Project Cards v4</h1>

    <div class="auth-box">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" id="login-btn">Login</button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Make one here</a></p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
