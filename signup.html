<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Cards — Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <img src="https://firebasestorage.googleapis.com/v0/b/projectcards-b6b53.firebasestorage.app/o/gamesprites%2Ficon.png?alt=media&token=ebc2eae1-0069-4fd7-9eee-8eca3ce85bb4" alt="Project Cards" class="auth-logo" />
    <h1>Project Cards</h1>

    <div class="auth-box">
      <h2>Create Account</h2>
      <form id="signup-form">
        <input type="text" id="signup-username" placeholder="Username" required />
        <input type="email" id="signup-email" placeholder="Email" required />
        <input type="password" id="signup-password" placeholder="Password (6+ characters)" required />
        <button type="submit" id="signup-btn">Create Account</button>
      </form>
      <p id="signup-status"></p>
      <p class="auth-switch">Already have an account? <a href="index.html">Login here</a></p>
    </div>
  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>
