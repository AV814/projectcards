<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Project Cards</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="profile-header">
    <img id="profile-pic" src="" alt="PFP" class="profile-pic" onerror="this.style.display='none'" />
    <p id="user-info"></p>
    <p id="total-card-value"></p>
  </div>

  <input type="file" id="upload-pfp" accept="image/*" style="display:none;" />

  <a href="menu.html" class="button">Menu</a>
  <a href="stocks.html" class="button">Stocks</a>
  <a href="lootbox.html" class="button">Loot Boxes</a>
  <a href="trades.html" class="button">Trades</a>
  <a href="profiles.html" class="button">Leaderboard</a>

  <h2>[ Card Inventory ]</h2>
  <div id="card-container"></div>

  <h2>[ Stock Holdings ]</h2>
  <div id="stock-holdings"></div>

  <h2>[ Last Week's Report ]</h2>
  <div id="weekly-report"></div>

  <div id="footer-section">
    <button id="change-pfp">PFP Upload</button>
    <button id="logout">Logout</button>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
