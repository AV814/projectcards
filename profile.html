<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Profile | Project Cards</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
      text-align: center;
    }
    #player-name { font-size: 2em; font-weight: 600; color: #C2C2C2; margin: 5px 0 2px; }
    #player-points { font-size: 1.3em; color: #00b894; margin: 0 0 15px; }

    /* Trade section */
    #trade-section {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 15px;
      text-align: left;
    }
    #trade-section h2 { color: #ccc; border-bottom: 1px solid #444; padding-bottom: 6px; }

    .trade-panel {
      background: #2c2f36;
      border-radius: 10px;
      padding: 20px;
    }
    .trade-panel p { color: #aaa; font-size: 0.9em; margin-bottom: 15px; }

    .trade-row {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .trade-row label { color: #aaa; font-size: 0.85em; min-width: 90px; }
    .trade-row select, .trade-row input[type="number"] {
      flex: 1;
      min-width: 140px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1c1c2b;
      color: white;
      font-family: Courier, monospace;
    }
    .trade-row input[type="number"] { max-width: 80px; flex: none; }

    .add-card-btn {
      background: #2d6a4f;
      font-size: 0.85em;
      padding: 6px 12px;
      margin-top: 5px;
    }
    .add-card-btn:hover { background: #40916c; }
    .remove-card-btn {
      background: #613535;
      font-size: 0.8em;
      padding: 4px 8px;
    }
    .remove-card-btn:hover { background: #b36d6d; }

    .offer-items, .want-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .card-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #1c1c2b;
      padding: 8px 10px;
      border-radius: 6px;
      flex-wrap: wrap;
    }
    .card-row span { flex: 1; font-size: 0.9em; min-width: 120px; }

    .send-trade-btn {
      width: 100%;
      padding: 12px;
      font-size: 1em;
      margin-top: 15px;
      background: #40557A;
    }
    .send-trade-btn:hover { background: #476DC9; }

    .trade-divider {
      text-align: center;
      color: #fdcb6e;
      font-size: 1.2em;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <div id="profile-header">
    <img id="player-pfp" src="" alt="Profile Picture" class="profile-pic" onerror="this.style.display='none'" />
    <p id="player-name">Loading...</p>
    <p id="player-points"></p>
  </div>

  <div style="text-align:center; margin-bottom:15px;">
    <a href="profiles.html" class="button">← Leaderboard</a>
    <a href="menu.html" class="button">Menu</a>
    <a href="dashboard.html" class="button">Dashboard</a>
  </div>

  <h2 style="text-align:center">[ Inventory ]</h2>
  <div id="card-list"></div>

  <!-- Trade section — hidden until data loads, hidden if viewing own profile -->
  <div id="trade-section" style="display:none">
    <h2>🔄 Propose a Trade</h2>
    <div class="trade-panel">
      <p id="trade-intro"></p>

      <strong>You offer:</strong>
      <div class="offer-items" id="offer-items"></div>
      <button class="add-card-btn" id="add-offer-btn">+ Add a card to offer</button>

      <div class="trade-divider">⇄</div>

      <strong>You want from <span id="trade-target-name"></span>:</strong>
      <div class="want-items" id="want-items"></div>
      <button class="add-card-btn" id="add-want-btn">+ Add a card to request</button>

      <button class="send-trade-btn" id="send-trade-btn">Send Trade Offer</button>
    </div>
  </div>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
